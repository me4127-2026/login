<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Offline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      background:#f5f5f5;
      text-align:center;
    }

    .box{
      padding:30px;
      background:white;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      color:#d32f2f;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>You are offline</h2>
  <p>Please reconnect to internet.</p>
</div>

</body>
</html>
